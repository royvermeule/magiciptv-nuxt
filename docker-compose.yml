services:
  postgres:
    image: postgres:17-alpine
    container_name: magiciptv-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: magiciptv
      POSTGRES_PASSWORD: magiciptv_dev
      POSTGRES_DB: magiciptv
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog
    container_name: magiciptv-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
